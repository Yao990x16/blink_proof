[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
blink_proof = "Bi5tyuZ7xG8d718WcP8AhHJpxqADTCkPBTDoS3ncRpiQ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Anchor expects the `test` script to be an actual test runner.
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""
# Start Surfpool as the local cluster for this workspace.
# Recommended flow:
# 1. `anchor run localnet`
# 2. `anchor test --skip-local-validator`
localnet = "surfpool start -y --legacy-anchor-compatibility"
